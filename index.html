  <!--
      Minimal splash — prevents FOUC before React mounts, then React's
      LoadingScreen fades + detaches it. A short CSS fallback animation
      hides the splash after 280 ms if, for any reason, React never mounts
      — keeping the hero visible and ensuring it wins LCP quickly.
    -->
  <style>
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FAFAFA;
      animation: _splash-out .28s ease forwards;
    }

    html.dark #splash {
      background: #0D0D0D;
    }

    @keyframes _splash-out {

      0%,
      50% {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      99% {
        opacity: 0;
        visibility: visible;
        pointer-events: none;
      }

      100% {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    }

    #_splash-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 88px;
      height: 88px;
      background: #0070B3;
      color: #FFFFFF;
      border: 4px solid #111111;
      box-shadow: 8px 8px 0 0 #111111;
      font-family: 'Archivo Black', system-ui, sans-serif;
      font-weight: 900;
      font-size: 2rem;
      letter-spacing: -0.04em;
    }

    html.dark #_splash-logo {
      border-color: #FFFFFF;
      box-shadow: 8px 8px 0 0 #FFFFFF;
    }
  </style>

  <!--
      Fonts — Archivo Black (display / LCP), Archivo (body), JetBrains Mono.
      ── Loading strategy ───────────────────────────────────────────────────
      • Preconnect to fonts.gstatic.com (origin that serves the actual WOFF2
        files). We drop the fonts.googleapis.com preconnect because the
        stylesheet is tiny (~1 KB) and loading it issues its own connection —
        Lighthouse flagged the googleapis preconnect as "unused".
      • `rel="preload" as="style"` boosts the Google Fonts CSS to the highest
        fetch priority so it races with the JS bundle instead of waiting for
        it. The onload handler then upgrades it to `rel="stylesheet"`.
      • `display=swap` is on the CSS URL so fallback text paints immediately
        and web fonts swap in without blocking LCP.
    -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
    onload="this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" />
  </noscript>

  <!--
      DNS-prefetch only for project images — they live below the fold and
      are lazy-loaded, so a full preconnect (TLS handshake) would be wasted
      on the critical path and Lighthouse flags it as an "unused preconnect".
    -->
  <link rel="dns-prefetch" href="https://images.unsplash.com" />
