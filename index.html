    <!--
      Critical CSS for the BOLD splash screen.
    -->
    <style>
      @keyframes _splash-out {
        0%, 72%  { opacity: 1; visibility: visible; pointer-events: auto; }
        99%      { opacity: 0; visibility: visible; pointer-events: none; }
        100%     { opacity: 0; visibility: hidden;  pointer-events: none; }
      }
      @keyframes _splash-pop {
        0%   { transform: scale(0.6) rotate(-3deg); opacity: 0; }
        60%  { transform: scale(1.05) rotate(0deg); opacity: 1; }
        100% { transform: scale(1)    rotate(0deg); opacity: 1; }
      }
      @keyframes _splash-bounce {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-6px); }
      }

      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: hsl(0, 0%, 98%);
        background-image:
          linear-gradient(rgba(17,17,17,0.1) 2px, transparent 2px),
          linear-gradient(90deg, rgba(17,17,17,0.1) 2px, transparent 2px);
        background-size: 80px 80px;
        animation: _splash-out 1.1s ease forwards;
      }
      html.dark #splash {
        background-color: hsl(0, 0%, 5%);
        background-image:
          linear-gradient(rgba(255,255,255,0.1) 2px, transparent 2px),
          linear-gradient(90deg, rgba(255,255,255,0.1) 2px, transparent 2px);
      }

      #_splash-logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 112px;
        height: 112px;
        background: #0077BC;
        color: #FFFFFF;
        border: 4px solid #111111;
        box-shadow: 10px 10px 0 0 #111111;
        font-family: 'Archivo Black', system-ui, sans-serif;
        font-weight: 900;
        font-size: 2.5rem;
        letter-spacing: -0.04em;
        text-transform: uppercase;
        animation: _splash-pop 0.6s cubic-bezier(0.22,1,0.36,1) both;
      }
      html.dark #_splash-logo {
        border-color: #FFFFFF;
        box-shadow: 10px 10px 0 0 #FFFFFF;
      }
      #_splash-dots {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-top: 20px;
      }
      ._splash-dot {
        width: 10px;
        height: 10px;
        background: #111111;
      }
      html.dark ._splash-dot {
        background: #FFFFFF;
      }
      ._splash-dot:nth-child(1) { animation: _splash-bounce 1s ease infinite 0s; }
      ._splash-dot:nth-child(2) { animation: _splash-bounce 1s ease infinite 0.15s; }
      ._splash-dot:nth-child(3) { animation: _splash-bounce 1s ease infinite 0.3s; }
    </style>
