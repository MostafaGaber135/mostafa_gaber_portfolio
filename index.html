    <!--
      Theme detection — runs synchronously before any paint.
    -->
    <script>
      try {
        var _t = localStorage.getItem('theme') || 'light';
        document.documentElement.classList.add(_t);
      } catch (e) {}
    </script>

    <!--
      Minimal splash — quick fade, then React LoadingScreen removes it.
      Kept short so the hero <h1> wins LCP instead of the splash logo.
    -->
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #FAFAFA;
        animation: _splash-out .5s ease forwards;
      }
      html.dark #splash { background: #0D0D0D; }
      @keyframes _splash-out {
        0%, 40% { opacity: 1; visibility: visible; pointer-events: auto; }
        99%     { opacity: 0; visibility: visible; pointer-events: none; }
        100%    { opacity: 0; visibility: hidden;  pointer-events: none; }
      }
      #_splash-logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 88px;
        height: 88px;
        background: #0070B3;
        color: #FFFFFF;
        border: 4px solid #111111;
        box-shadow: 8px 8px 0 0 #111111;
        font-family: 'Archivo Black', system-ui, sans-serif;
        font-weight: 900;
        font-size: 2rem;
        letter-spacing: -0.04em;
      }
      html.dark #_splash-logo { border-color: #FFFFFF; box-shadow: 8px 8px 0 0 #FFFFFF; }
    </style>

    <!-- Fonts: Archivo Black (display), Archivo (body), JetBrains Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
    />
    <noscript>

    </noscript>

    <!-- Preconnect for project images (TLS handshake warmed up early) -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
