<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Bold offset shadow (black) -->
  <rect x="8" y="8" width="54" height="54" fill="#111111"/>

  <!-- Primary blue block with thick black border -->
  <rect x="2" y="2" width="54" height="54" fill="#0070B3" stroke="#111111" stroke-width="4"/>

  <!-- Bold blocky M -->
  <g fill="#FFFFFF">
    <!-- Outer left vertical -->
    <rect x="10" y="12" width="8" height="34"/>
    <!-- Outer right vertical -->
    <rect x="40" y="12" width="8" height="34"/>
    <!-- Left inner diagonal notch -->
    <rect x="18" y="18" width="6" height="6"/>
    <rect x="24" y="22" width="4" height="6"/>
    <!-- Middle V point -->
    <rect x="27" y="26" width="4" height="6"/>
    <!-- Right inner diagonal notch -->
    <rect x="30" y="22" width="4" height="6"/>
    <rect x="34" y="18" width="6" height="6"/>
  </g>

  <!-- Green accent square bottom-right -->
  <rect x="42" y="40" width="10" height="10" fill="#008A5B" stroke="#111111" stroke-width="3"/>
</svg>
